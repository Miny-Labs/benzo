<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">KYC-gated chain flow</title>
  <desc id="desc">Mock KYC can lead to txAllowList access on the stretch BenzoNet permissioned L1 path.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#8fd8ff" /></marker>
    <style>
      .bg { fill: #10151d; }
      .box { fill: #17212d; stroke: #38536b; stroke-width: 2; }
      .stretch { fill: #151b22; stroke: #8069d9; stroke-width: 2; stroke-dasharray: 10 8; }
      .white { fill: #ffffff; font: 700 34px Inter, ui-sans-serif, system-ui, sans-serif; }
      .sub { fill: #b7c6d3; font: 400 20px Inter, ui-sans-serif, system-ui, sans-serif; }
      .h { fill: #ffffff; font: 700 25px Inter, ui-sans-serif, system-ui, sans-serif; }
      .p { fill: #c5d2dc; font: 400 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .tag { fill: #10151d; font: 700 14px Inter, ui-sans-serif, system-ui, sans-serif; }
    </style>
  </defs>
  <rect width="1100" height="620" rx="28" class="bg" />
  <text x="60" y="78" class="white">KYC-gated chain</text>
  <text x="60" y="112" class="sub">Evergreen-style path: permissioned access plus encrypted eERC amounts.</text>

  <rect x="90" y="200" width="260" height="215" rx="22" class="box" />
  <rect x="122" y="230" width="90" height="28" rx="14" fill="#ffd38a" />
  <text x="139" y="250" class="tag">MOCK</text>
  <text x="122" y="300" class="h">KYC workflow</text>
  <text x="122" y="338" class="p">Name and country</text>
  <text x="122" y="368" class="p">No documents</text>

  <rect x="420" y="200" width="260" height="215" rx="22" class="box" />
  <rect x="452" y="230" width="105" height="28" rx="14" fill="#9ee6c7" />
  <text x="469" y="250" class="tag">GATE</text>
  <text x="452" y="300" class="h">txAllowList</text>
  <text x="452" y="338" class="p">Allowed senders</text>
  <text x="452" y="368" class="p">BGAS drip</text>

  <rect x="750" y="185" width="275" height="245" rx="22" class="stretch" />
  <rect x="782" y="216" width="118" height="28" rx="14" fill="#b9a9ff" />
  <text x="799" y="236" class="tag">STRETCH</text>
  <text x="782" y="288" class="h">BenzoNet</text>
  <text x="782" y="326" class="p">PoA validators</text>
  <text x="782" y="356" class="p">validatorOnly reads</text>
  <text x="782" y="386" class="p">eERC contracts</text>

  <path d="M350 307 L420 307" stroke="#8fd8ff" stroke-width="5" marker-end="url(#arrow)" />
  <path d="M680 307 L750 307" stroke="#8fd8ff" stroke-width="5" marker-end="url(#arrow)" />
</svg>
