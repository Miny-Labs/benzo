<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Private gifting flow</title>
  <desc id="desc">Gift links can be public escrow or private bearer links using an ephemeral eERC address.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#8fd8ff" /></marker>
    <style>
      .bg { fill: #10151d; }
      .box { fill: #17212d; stroke: #38536b; stroke-width: 2; }
      .screen { fill: #f7fafc; }
      .white { fill: #ffffff; font: 700 34px Inter, ui-sans-serif, system-ui, sans-serif; }
      .sub { fill: #b7c6d3; font: 400 20px Inter, ui-sans-serif, system-ui, sans-serif; }
      .h { fill: #ffffff; font: 700 25px Inter, ui-sans-serif, system-ui, sans-serif; }
      .p { fill: #c5d2dc; font: 400 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .ink { fill: #17212d; font: 700 24px Inter, ui-sans-serif, system-ui, sans-serif; }
      .muted { fill: #52606b; font: 400 17px Inter, ui-sans-serif, system-ui, sans-serif; }
    </style>
  </defs>
  <rect width="1100" height="620" rx="28" class="bg" />
  <text x="60" y="78" class="white">Private gifting</text>
  <text x="60" y="112" class="sub">Public escrow is simple; private bearer links use an ephemeral registered address.</text>

  <rect x="75" y="180" width="280" height="260" rx="22" class="box" />
  <text x="112" y="240" class="h">Sender</text>
  <text x="112" y="282" class="p">Create gift link</text>
  <text x="112" y="314" class="p">Ephemeral key</text>
  <text x="112" y="346" class="p">Optional private eERC send</text>

  <rect x="450" y="150" width="210" height="330" rx="34" class="box" />
  <rect x="475" y="198" width="160" height="235" rx="22" class="screen" />
  <text x="500" y="250" class="ink">Gift</text>
  <text x="500" y="286" class="muted">Claim ready</text>
  <rect x="500" y="325" width="110" height="38" rx="19" fill="#9ee6c7" />
  <text x="532" y="350" fill="#10151d" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">CLAIM</text>

  <rect x="745" y="180" width="280" height="260" rx="22" class="box" />
  <text x="782" y="240" class="h">Recipient</text>
  <text x="782" y="282" class="p">Register wallet</text>
  <text x="782" y="314" class="p">Sweep private balance</text>
  <text x="782" y="346" class="p">Bearer secret risk</text>

  <path d="M355 310 L450 310" stroke="#8fd8ff" stroke-width="5" marker-end="url(#arrow)" />
  <path d="M660 310 L745 310" stroke="#8fd8ff" stroke-width="5" marker-end="url(#arrow)" />
</svg>
