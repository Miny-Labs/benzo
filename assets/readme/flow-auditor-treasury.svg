<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Auditor-ready treasury flow</title>
  <desc id="desc">An organization sees private treasury activity while a demo auditor key can decrypt auditor ciphertexts.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#ffc56e" /></marker>
    <style>
      .bg { fill: #10151d; }
      .box { fill: #17212d; stroke: #38536b; stroke-width: 2; }
      .screen { fill: #f7fafc; }
      .white { fill: #ffffff; font: 700 34px Inter, ui-sans-serif, system-ui, sans-serif; }
      .sub { fill: #b7c6d3; font: 400 20px Inter, ui-sans-serif, system-ui, sans-serif; }
      .ink { fill: #17212d; font: 700 24px Inter, ui-sans-serif, system-ui, sans-serif; }
      .muted { fill: #52606b; font: 400 17px Inter, ui-sans-serif, system-ui, sans-serif; }
      .p { fill: #c5d2dc; font: 400 18px Inter, ui-sans-serif, system-ui, sans-serif; }
    </style>
  </defs>
  <rect width="1100" height="620" rx="28" class="bg" />
  <text x="60" y="78" class="white">Auditor-ready treasury</text>
  <text x="60" y="112" class="sub">Balances stay encrypted; auditor ciphertexts make review possible with the right key.</text>

  <rect x="80" y="170" width="430" height="335" rx="22" class="box" />
  <rect x="115" y="210" width="360" height="250" rx="16" class="screen" />
  <text x="140" y="252" class="ink">Treasury</text>
  <text x="140" y="288" class="muted">Private balance</text>
  <rect x="140" y="320" width="190" height="66" rx="18" fill="#17212d" />
  <text x="174" y="362" fill="#f7fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700">****</text>
  <rect x="140" y="415" width="285" height="18" rx="9" fill="#dce5eb" />

  <rect x="620" y="170" width="400" height="335" rx="22" class="box" />
  <rect x="655" y="210" width="330" height="250" rx="16" fill="#1f2a36" />
  <text x="685" y="258" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="700">Auditor view</text>
  <text x="685" y="302" class="p">Decrypt selected PCTs</text>
  <text x="685" y="334" class="p">Reconcile tx history</text>
  <text x="685" y="366" class="p">Export review notes</text>
  <rect x="685" y="402" width="190" height="34" rx="17" fill="#ffd38a" />
  <text x="713" y="425" fill="#10151d" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">DEMO KEY TODAY</text>

  <path d="M510 335 C565 335 570 335 620 335" stroke="#ffc56e" stroke-width="5" stroke-dasharray="10 8" marker-end="url(#arrow)" />
</svg>
