name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm --filter @benzo/config test
      - run: pnpm --filter @benzo/contracts compile
      - run: pnpm --filter @benzo/contracts zkit:make
      - run: pnpm --filter @benzo/contracts artifacts:export
      - run: pnpm --filter @benzo/contracts artifacts:verify
      # Report but don't fail on transitive advisories (triage signal).
      - run: pnpm audit --audit-level high || true
