# Alertmanager config. The default receiver is a no-op sink so the pipeline is
# complete (Prometheus -> Alertmanager) out of the box; wire a real channel
# (email/Slack/PagerDuty) for the demo. See
# https://prometheus.io/docs/alerting/latest/configuration/
route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: default
    # No notifier configured yet — alerts collect here and are visible in the
    # Alertmanager UI. Add e.g. slack_configs / email_configs to page someone.
